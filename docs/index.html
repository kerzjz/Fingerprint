<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<link rel="icon" href="favicon.ico">
	<link rel="stylesheet" href="style.min.css">
	<script src="creep.js" defer></script>
	<title>CreepJS</title>
</head>
<body>
	<div id="fp-app">
		<fingerprint>
			<div id="fingerprint-data">
				<div class="fingerprint-header-container">
					<div class="fingerprint-header">
						<div class="ellipsis-all">设备简易信息</div>
					</div>
				</div>

				<div class="flex-grid">
					<div class="col-six">
						<strong>系统信息</strong>
						<div class="block-text" id="osInfo"></div>
					</div>
					<div class="col-six">
						<strong>屏幕尺寸</strong>
						<div class="block-text" id="screenInfo"></div>
					</div>
				</div>

				<div class="flex-grid">
					<div class="col-six">
						<strong>剩余电量</strong>
						<div class="block-text" id="batLevel"></div>
					</div>
					<div class="col-six">
						<strong>充电状态</strong>
						<div class="block-text" id="batStatus"></div>
					</div>
				</div>

			</div>
		</fingerprint>
	</div>

<script>
// 复用原有环境，直接取值填入
window.addEventListener('load',async()=>{
    // 系统
    document.getElementById('osInfo').innerText = navigator.platform + " | " + navigator.userAgent.split(' ').pop();
    // 屏幕
    document.getElementById('screenInfo').innerText = screen.width + " × " + screen.height;
    // 电池
    if(navigator.getBattery){
        let bat = await navigator.getBattery();
        document.getElementById('batLevel').innerText = Math.round(bat.level*100)+"%";
        document.getElementById('batStatus').innerText = bat.charging ? "正在充电" : "未充电";
    }else{
        document.getElementById('batLevel').innerText = "暂不支持";
        document.getElementById('batStatus').innerText = "暂不支持";
    }
})
</script>
</body>
</html>
